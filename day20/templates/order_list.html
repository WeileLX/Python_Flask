{% extends 'layout.html' %}

{% block body %}
    <div style="margin-bottom: 15px;">
        <a class="btn btn-success" href="/order/create">
            <span class="glyphicon glyphicon-plus-sign" aria-hidden="true"></span> 添加 </a>
    </div>

    <table class="table table-striped">

        <thead>

        <tr>
                <th>ID</th>
                <th>url</th>
                <th>count</th>
                <th>name</th>
                <th>status</th>

            </tr>
        </thead>
        <tbody>
        {% for item  in data_list%}
        <tr>
            <td>{{item.id}}</td>
            <td>{{item.url}}</td>
            <td>{{item.count}}</td>
            <td>{{item.real_name}}</td>
            <td><span class="label label-{{status_return[item.status].cls}}">{{status_return[item.status].text}}</span></td>
        </tr>

        {% endfor %}

        </tbody>
    </table>
{% endblock%}
